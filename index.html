<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SensiForge - Conversor Gamer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 SensiForge</h1>
        <p class="subtitle">Converta sua sensibilidade entre jogos</p>

        <div class="card">
            <div class="input-group">
                <label for="sensi-atual">Sua Sensibilidade Atual (CS 1.6 / Counter-Strike):</label>
                <input type="number" id="sensi-atual" placeholder="Ex: 2.0" step="0.1">
            </div>

            <button onclick="converterSensi()">Converter Sensibilidade</button>

            <div class="result-box" id="resultado" style="display: none;">
                <h3>🎯 Suas Conversões:</h3>
                <p><strong>Standoff 2:</strong> <span id="res-standoff">0</span></p>
                <p><strong>Free Fire:</strong> <span id="res-ff">0</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
